id: phi-1.5
gguf_path: ~/models/phi-1_5.Q8_0.gguf
alias: phi-1.5
family: phi
params_b: 1.3
quant: Q8_0
has_native_tool_template: false
bfcl_mode: inject  # auto-mode never falls back here (no parse error fires); must force inject
server:
  n_ctx: 8192
  n_gpu_layers: 99
  n_threads: 6
  n_batch: 512
  n_ubatch: 512
  flash_attn: auto
  cache_type_k: q8_0
  cache_type_v: q8_0
  # No native tool-use chat template; --jinja still on, llama.cpp will fall
  # back to a generic template. Tools will be prompt-injected by the BFCL
  # adapter and recovered from text via the 5-shape parser. This is the
  # parser stress-test slot — it validates that lifting deluxe lesson #11.2
  # ports cleanly onto whatever shape Phi-1.5 emits.
  jinja: true
sampling:
  temperature: 0.0
  top_p: 1.0
  repeat_penalty: 1.0
  seed: 42
  max_tokens: 512   # Phi-1.5 is base, not instruction-tuned — pegs to max on every problem
                    # if given more headroom. 512 is enough for a single tool call.
notes: Negative-control / parser stress-test slot. No native tool-use; prompt-injected tool spec only. Worst-case BFCL score is fine; the value is exercising the 5-shape text-channel parser at its limit.
