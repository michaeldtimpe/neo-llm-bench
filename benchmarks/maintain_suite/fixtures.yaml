  # --- 5) nothing-ever-happens — Polymarket trading bot (907 KB) -----------
  - id: nothing-ever-happens-manage-deps-audit
    repo_url: /Users/michaeltimpe/.llamabench/fixture-cache/nothing-ever-happens
    base_sha: 59b8874a8e87164f0ebec25b43ae2cc1a0086f7a
    goal: "Audit requirements.txt: identify any pinned dependencies with known security advisories, document them in a SECURITY-AUDIT.md file with at least three concrete findings (CVE id, version range, or upstream advisory link), and propose pinned-version upgrades that preserve API compatibility. Do not modify requirements.txt itself"
    task_type: manage
    expected_outcome:
      kind: regex_present
      pattern: "(?i)(CVE-\\d{4}-\\d{4,}|GHSA-[\\w-]+|advisory|vulnerability|>=\\s?\\d|<\\s?\\d)"
      min_matches: 3          # forces ≥3 concrete-finding lines, defeats
                              # vacuous "no known issues" surveys
      min_added_lines: 12     # an audit with 3+ findings + upgrade rationale
    notes: |
      Largest Python repo in the seed set. min_matches=3 + version-string /
      CVE pattern defends against "no critical vulnerabilities found"
      vacuous-audit gaming seen in the 8-bit completion bake-off.
      SpecDD Lever 1 (v1.4-prep): mechanical port — the legacy grader's
      ≥3 matches across CVE/GHSA/advisory/vulnerability/version-constraint
      patterns already maps cleanly to the goal's "at least three concrete
      findings (CVE id, version range, or upstream advisory link)". Audit
      memo specifically called this fixture out as well-aligned; preserved.
    requirements:
      - id: R1
        must: "Document at least three concrete findings (CVE id, GHSA id, advisory link, or version constraint) in SECURITY-AUDIT.md"
        done_when: "regex matches CVE/GHSA/advisory/vulnerability/version-constraint terms in ≥3 added lines"
        kind: regex_present
        pattern: "(?i)(CVE-\\d{4}-\\d{4,}|GHSA-[\\w-]+|advisory|vulnerability|>=\\s?\\d|<\\s?\\d)"
        min_matches: 3

  - id: nothing-ever-happens-document-config
    repo_url: /Users/michaeltimpe/.llamabench/fixture-cache/nothing-ever-happens
    base_sha: 59b8874a8e87164f0ebec25b43ae2cc1a0086f7a
    goal: "Add a CONFIG.md at the repo root that documents every environment variable the bot reads at startup. For each variable, list its name, default value (if any), and a one-sentence description of what it controls. Cross-reference where in the codebase it is read"
    task_type: document
    expected_outcome:
      kind: regex_present
      # Branch C calibration 2026-05-01: original pattern required Python
      # idiom quotes (os.environ / getenv / env[ / process.env) which
      # excluded prose-style docs that document env vars by NAME with
      # file:line citations rather than quoting the Python expression.
      # Real failure mode this fixed: probe_b's 136-line CONFIG.md (52
      # env vars, full markdown tables, file:line citations) scored 0
      # matches and failed. Post-calibration: the pattern is OR'd with
      # `\b[A-Z_]{2,}[A-Z0-9_]{3,}\b` (UPPER_SNAKE_LIKE token). Composite
      # accepts both code-quote and prose-style docs; min_added_lines=20
      # remains the substantive-edit defense against vacuous output.
      # Justification + (a)/(b)/(c) gate entry in lessons.md.
      pattern: "(?i)(?:os\\.environ|getenv|env\\[|process\\.env)|\\b[A-Z_]{2,}[A-Z0-9_]{3,}\\b"
      min_matches: 3          # forces enumeration of multiple env vars
      min_added_lines: 20     # a real config doc, not a stub
    notes: |
      Document/manage hybrid on the largest Python repo. The model must
      grep for env reads across the codebase, not pattern-match on a single
      file. min_matches=3 + 20 added lines defends against listing one var
      in a sentence and stopping. Pattern accepts either Python idiom
      quotes OR markdown-style UPPER_SNAKE env var names.
      SpecDD Lever 1 (v1.4-prep): tight migration. Legacy grader's
      min_matches=3 was loose against the goal's "every env var"
      (~23 in source). R1 raises the bar to ≥15 env-var-style tokens
      (~65% coverage; passing runs document 56+, FAIL runs 0 — clean
      separator). R2 verifies cross-reference to source files. R3
      verifies default-value cues. Variance (~33% prose-loop FAIL) is
      orthogonal to grader rigor — tightening makes the bench more
      meaningful on PASSing runs without changing the variance rate.
    requirements:
      - id: R1
        must: "Document a substantial fraction of the env vars the bot reads (≥15 distinct env-var-style tokens; source has ~23)"
        done_when: "regex matches env-var-style tokens (UPPER_SNAKE or os.environ-style) in ≥15 added lines"
        kind: regex_present
        pattern: "(?i)(?:os\\.environ|getenv|env\\[|process\\.env)|\\b[A-Z_]{2,}[A-Z0-9_]{3,}\\b"
        min_matches: 15
      - id: R2
        must: "Cross-reference at least 3 source files where env vars are read (e.g., bot/main.py, bot/config.py)"
        done_when: "regex matches a bot/*.py file path or requirements.txt in ≥3 added lines"
        kind: regex_present
        pattern: "bot/[\\w./]+\\.py|requirements\\.txt"
        min_matches: 3
      - id: R3
        must: "Provide default values for env vars (not just names)"
        done_when: "regex matches a default-value cue ('default:', backticked literal) in ≥3 added lines"
        kind: regex_present
        pattern: "(?i)default[^a-z]|`(?:None|True|False|paper|live|[0-9]+|[\"'])"
        min_matches: 3
