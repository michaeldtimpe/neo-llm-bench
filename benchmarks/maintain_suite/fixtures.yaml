# llamabench v1.0 acceptance fixtures.
#
# Schema (one entry per fixture):
#
#   - id: <unique-string>
#     repo_url: <git URL or local path>  # local paths are cloned offline
#                                        # OR repo_path: <local checkout, used in-place>
#     base_sha: <40-char hex>        # deterministic starting point
#     goal: "<one sentence>"
#     task_type: bugfix | implement | document | manage
#     expected_outcome:
#       kind: tests_pass | regex_present | regex_absent | manual_review
#       command: "<shell>"           # for tests_pass
#       pattern: "<regex>"           # for regex_*
#       min_matches: <int>           # OPTIONAL (regex_present); default 1.
#                                    # Pattern must hit in ≥N distinct ADDED
#                                    # lines. Use ≥2 to defeat single-edit
#                                    # gaming on multi-call-site tasks.
#       min_added_lines: <int>       # OPTIONAL (regex_present); default 0.
#                                    # Diff must add ≥N total lines across
#                                    # changed files. Use 5-30 to defeat
#                                    # rename-only or one-line "edits" that
#                                    # technically match the regex.
#       criteria: "<text>"           # for manual_review
#     required_env: [GITHUB_TOKEN]   # optional; missing → skipped
#     notes: "<freeform>"            # documentation, not graded
#
# v1.0 release gate: ≥8 of ≥10 fixtures pass (≥4/5 score each).

fixtures:

  # --- 1) lpe-rope-calc — single-file Python utility (20 KB) ---------------
  - id: lpe-rope-calc-document-typing
    repo_url: /Users/michaeltimpe/.llamabench/fixture-cache/lpe-rope-calc
    base_sha: 5c6b51f80e76f80c49a789029414f5152a5edbd7
    goal: "Add type hints to any untyped parameters in top-level function signatures (most are already typed; the remaining untyped ones are the gap), preserving existing behaviour. The module already has a docstring at the top of pe_scan.py — do not add a redundant one."
    task_type: document
    expected_outcome:
      kind: regex_present
      pattern: "def \\w+\\([^)]*: ?(?:str|int|float|bool|Path|list|dict|Optional|None|Any|IO|BinaryIO|TextIO)"
      min_matches: 1          # pe_scan.py at 5c6b51f has 14 top-level defs,
                              # 13 already-typed, 1 untyped (`f` in
                              # _read_gguf_value). ≥1 matches the actual gap.
      min_added_lines: 2      # 2026-05-03 fixture surgery (round 2): the
                              # 2026-05-01 surgery aligned min_matches to
                              # actual file state but kept min_added_lines=4
                              # assuming the docstring half was unmet. It
                              # WAS already met — pe_scan.py at 5c6b51f
                              # ships with a 14-line module docstring at
                              # lines 2-14. The model correctly identified
                              # the existing docstring across multiple runs
                              # and refused to add a redundant one; the
                              # fixture was failing because of a grader
                              # gate asking for content the file already
                              # has. Round-2 fix: drop the docstring
                              # requirement from the goal and lower the
                              # floor to 2 (one typing import + one
                              # signature edit).
    notes: |
      Easy-win document task. Single-file repo; mono mode handles in <2 min once warm.
      Fixture surgery 2026-05-01: thresholds aligned to actual untyped-param count.
      Fixture surgery 2026-05-03: dropped docstring requirement (already present
      in base file at lines 2-14); lowered min_added_lines to match typing-only
      target. Investigation that surfaced this is in lessons.md v1.3.0 entry.
      SpecDD Lever 1 (v1.4-prep): proof-of-concept fixture for `requirements:`
      schema. Currently runs ALONGSIDE expected_outcome (parallel observation);
      does not gate score. When the integration matures, expected_outcome will
      become a transitional alias for R1.
    requirements:
      - id: R1
        must: "Add a type hint to any untyped parameter in a top-level function signature in pe_scan.py"
        done_when: "regex matches in ≥1 added line: a typed-parameter signature using a recognized type"
        kind: regex_present
        pattern: "def \\w+\\([^)]*: ?(?:str|int|float|bool|Path|list|dict|Optional|None|Any|IO|BinaryIO|TextIO)"
        min_matches: 1

