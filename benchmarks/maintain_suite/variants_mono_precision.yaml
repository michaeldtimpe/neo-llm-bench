# Mono-precision bake-off — does higher quantization precision change
# real-world quality on the v1.0 fixture set?
#
# Hypothesis the user wants to test: 4-bit may be hurting output quality
# enough that the architecture-level work (swarm/micro/phased) was masking
# what's really a quantization issue. If the 8-bit/6-bit variants pass
# substantially more fixtures than 4-bit at the same parameter count,
# the answer is "yes, throw bits at it" before throwing more orchestration.
#
# Run (from repo root):
#   brew services restart omlx
#   python -m benchmarks.maintain_suite.run \
#       --variants benchmarks/maintain_suite/variants_mono_precision.yaml \
#       --output acceptance/mono_precision \
#       --per-fixture-timeout 1800 \
#       --all
#
# 4 cells × 5 fixtures = 20 runs.
#
# Memory budget per cell (peak resident, single model in mono):
#   14B-abliterated-6bit:  ~11 GB  (estimate — verify after download finishes)
#   14B-8bit:              ~15.7 GB
#   32B-6bit:              ~26.6 GB  (closest to oMLX 36 GB cap)
#   Qwen3-30B-A3B-6bit:    ~24.8 GB  (MoE — 30B total, 3B active)
# All fit under the 36 GB max_model_memory cap. Each variant runs solo
# in mono mode so no co-resident pressure.

variants:
  # Same model, ablated refusal layer, 6-bit quant — does removing the
  # safety-tuning layer change behaviour on coding tasks?
  - {mode: mono, model_label: qwen-coder-14b-abliterated-6bit, model_id: Qwen2.5-Coder-14B-Instruct-abliterated-6bit}
  # Standard 14B Coder at higher precision than the 4-bit baseline.
  - {mode: mono, model_label: qwen-coder-14b-8bit,             model_id: Qwen2.5-Coder-14B-Instruct-8bit}
  # Bigger model at moderate precision — same memory neighborhood as the
  # 14B-8bit but more parameters at lower bits-per-weight.
  - {mode: mono, model_label: qwen-coder-32b-6bit,             model_id: Qwen2.5-Coder-32B-Instruct-6bit}
  # Qwen3 MoE — 30B total / 3B active per token. Different architecture
  # entirely, included to see whether the MoE active-set inference
  # advantage shows up in real PR work.
  - {mode: mono, model_label: qwen3-coder-30b-a3b-6bit,        model_id: Qwen3-Coder-30B-A3B-Instruct-6bit}
